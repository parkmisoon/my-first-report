<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>공직자 초과근무수당 계산기</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h1>공직자 초과근무수당 계산기</h1>

    <div class="form-group">
        <label for="grade">직급</label>
        <select id="grade">
            <option value="12000">9급</option>
            <option value="13000">8급</option>
            <option value="14500">7급</option>
            <option value="16000">6급</option>
            <option value="18000">5급</option>
        </select>
    </div>

    <div class="form-group">
        <label for="hours">초과근무시간</label>
        <input type="number" id="hours" min="0" step="0.5" value="0">
    </div>

    <div class="form-group">
        <label for="holiday">휴일근무 여부</label>
        <select id="holiday">
            <option value="no">아니오</option>
            <option value="yes">예</option>
        </select>
    </div>

    <div class="form-group">
        <label for="night">야간수당 가산 여부</label>
        <select id="night">
            <option value="no">아니오</option>
            <option value="yes">예</option>
        </select>
    </div>

    <div class="form-group">
        <label for="extra">식대 및 기타 추가수당(원)</label>
        <input type="number" id="extra" value="0">
    </div>

    <button onclick="calculate()">계산하기</button>

    <div id="result"></div>
</div>

<script src="script.js"></script>

</body>
</html>
